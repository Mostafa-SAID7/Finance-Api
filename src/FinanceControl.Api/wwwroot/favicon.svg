<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0e27" rx="20"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Coin circle -->
  <circle cx="50" cy="50" r="35" fill="url(#grad1)"/>
  
  <!-- Dollar sign -->
  <text x="50" y="65" font-size="60" font-weight="bold" fill="#0a0e27" text-anchor="middle" font-family="Arial, sans-serif">$</text>
  
  <!-- Shine effect -->
  <ellipse cx="35" cy="35" rx="12" ry="15" fill="white" opacity="0.3"/>
</svg>
